name: CI
on:
  push:
      branches-ignore:
        - 'dependabot/**'
      tags:
        - '**'
  pull_request:
jobs:
  build:
    name: Build & test
    strategy:
      matrix:
        include:
          - platform: linux
            arch: x64
            os: "ubuntu-22.04"
          - platform: linux
            arch: arm64
            os: "ubuntu-24.04-arm"
          - platform: windows
            arch: x64
            os: "windows-2022"
          - platform: mac
            arch: x64
            os: "macos-15-intel"
          - platform: mac
            arch: arm64
            os: "macos-14"
    runs-on: ${{ matrix.os }}
    environment: ${{ (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) && 'production' || null }}
    permissions:
      contents: read
      id-token: write # OIDC with Azure for Windows signing
    env:
      IS_RELEASE: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          check-latest: true
          cache: 'npm'

      # Due to https://github.com/electron-userland/electron-builder/issues/3901
      # Electron-Builder fails to produce deb packages on arm64 without this:
      - name: Install system FPM to fix ARM64 Linux builds
        if: matrix.platform == 'linux' && matrix.arch == 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install ruby ruby-dev build-essential
          sudo gem install --no-document fpm

      - run: npm ci

      # The API key in APPLE_API_KEY is a PEM cert that must be read from disk:
      - name: Prepare Apple API key
        if: env.IS_RELEASE == 'true' && startsWith(matrix.os, 'macos-')
        run: echo "$APPLE_API_KEY" > ./apple-api-key.p8
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}

      - name: Azure login for Windows signing
        if: env.IS_RELEASE == 'true' && matrix.platform == 'windows'
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Run signed build
        if: env.IS_RELEASE == 'true'
        run: npm run build
        env:
          ENABLE_SIGNING: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # For Mac notarization:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY: ./apple-api-key.p8
          # For Mac signing:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # For Windows signing via Azure Artifact Signing:
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          # Workaround - see FPM install step above
          USE_SYSTEM_FPM: ${{ matrix.platform == 'linux' && matrix.arch == 'arm64' }}

      - name: Run unsigned build
        if: env.IS_RELEASE != 'true'
        run: npm run build
        env:
          ENABLE_SIGNING: false
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USE_SYSTEM_FPM: ${{ matrix.platform == 'linux' && matrix.arch == 'arm64' }}

      # [DIAG] The 14-20s slowdown is a once-per-VM *first-launch* cost (prior runs: only launch #1
      # was slow, #2+ were ~0.7s) and it survives drop_caches/font/userdata clearing - so it's NOT
      # disk/fontconfig/first-run (the breakdown proved those are <1s). This runs the GENUINE first
      # app launch (electron-builder above doesn't launch the app) with a vmstat sampler, so when a
      # re-run lands on a slow VM we can see *why*: st=CPU steal/contention, wa=iowait, or id=idle
      # (idle-but-slow => single-threaded blocking inside Chromium, e.g. GPU-init retry).
      # RE-RUN THE JOB until one lands on a slow VM. Also doubles as a warm-up for the gating test.
      - name: "[DIAG] instrumented first launch + vmstat sampling"
        if: ${{ always() && matrix.platform == 'linux' }}
        continue-on-error: true
        run: |
          set +e
          echo "nproc=$(nproc)  loadavg=$(cat /proc/loadavg)  uptime=$(cat /proc/uptime)"
          ( vmstat 1 90 > /tmp/vmstat.log 2>&1 ) &
          VM=$!
          echo "===== GENUINE FIRST LAUNCH (watch the 'app ready' uptime=Xs) ====="
          xvfb-run --auto-servernum npx playwright test 2>&1 | grep -E "\[DIAG\]\[T\+|\[DIAG\]\[test" || true
          sleep 1; kill "$VM" 2>/dev/null
          echo "===== vmstat through the launch window (cols: r b ... wa st; st=steal wa=iowait id=idle) ====="
          cat /tmp/vmstat.log
        shell: bash

      - name: Run smoke tests
        run: |
          # We manually start ADB, so the tests don't (because if they do, they fail
          # to exit, due to the hanging process)
          "$ANDROID_HOME/platform-tools/adb" start-server 2>/dev/null || true

          if [ "$RUNNER_OS" == "Linux" ]; then
            xvfb-run --auto-servernum npm test
          else
            npm test
          fi
        shell: bash

      - uses: actions/upload-artifact@v6
        if: matrix.platform == 'linux'
        with:
          name: HttpToolkit-linux-${{ matrix.arch }}-deb
          path: dist/HttpToolkit-*.deb
          if-no-files-found: error

      - uses: actions/upload-artifact@v6
        if: matrix.platform == 'linux'
        with:
          name: HttpToolkit-linux-${{ matrix.arch }}-rpm
          path: dist/HttpToolkit-*.rpm
          if-no-files-found: error

      - uses: actions/upload-artifact@v6
        if: matrix.platform == 'linux'
        with:
          name: HttpToolkit-linux-${{ matrix.arch }}-AppImage
          path: dist/HttpToolkit-*.AppImage
          if-no-files-found: error

      - uses: actions/upload-artifact@v6
        if: matrix.platform == 'linux'
        with:
          name: HttpToolkit-linux-${{ matrix.arch }}-zip
          path: dist/HttpToolkit-*linux*.zip
          if-no-files-found: error

      - uses: actions/upload-artifact@v6
        if: matrix.platform == 'windows'
        with:
          name: HttpToolkit-windows-${{ matrix.arch }}-exe
          path: dist/HttpToolkit-*.exe
          if-no-files-found: error

      - uses: actions/upload-artifact@v6
        if: matrix.platform == 'windows'
        with:
          name: HttpToolkit-windows-${{ matrix.arch }}-zip
          path: dist/HttpToolkit-*win*.zip
          if-no-files-found: error

      - uses: actions/upload-artifact@v6
        if: matrix.platform == 'mac'
        with:
          name: HttpToolkit-mac-${{ matrix.arch }}-dmg
          path: dist/HttpToolkit-*.dmg
          if-no-files-found: error
  publish:
    name: Publish a release
    runs-on: "ubuntu-22.04"
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Get all distributables
        uses: actions/download-artifact@v7

      - name: Normalize arch names to x64 or arm64
        run: |
          find . -maxdepth 2 -type f -name "*" | while read -r file; do
            filename=$(basename "$file")
            newname=$(echo "$filename" | sed -e 's/amd64/x64/g' -e 's/x86_64/x64/g' -e 's/aarch64/arm64/g')
            if [ "$filename" != "$newname" ]; then
              mv -v "$file" "$newname"
            fi
          done

      - name: Publish to GitHub Releases
        uses: svenstaro/upload-release-action@v2
        with:
          tag: ${{ github.ref }}
          prerelease: true
          file: ./**/*
          file_glob: true
          repo_token: ${{ secrets.GITHUB_TOKEN }}

  submit-winget:
    name: Submit to WinGet repository
    needs: publish
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    # wingetcreate only runs on Windows
    runs-on: windows-latest
    steps:
      - name: Sync winget-pkgs fork with upstream
        env:
          GH_TOKEN: ${{ secrets.WINGET_GITHUB_TOKEN }}
        run: |
          $forkOwner = gh api user --jq '.login'
          gh repo sync "$forkOwner/winget-pkgs" --source microsoft/winget-pkgs

      - name: Submit package using wingetcreate
        run: |
          $packageVersion = "${{ github.ref }}" -replace 'refs/tags/v', ''
          $installerUrl = "https://github.com/httptoolkit/httptoolkit-desktop/releases/download/v$packageVersion/HttpToolkit-$packageVersion.exe"

          # Update package using wingetcreate
          Invoke-WebRequest https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe
          .\wingetcreate.exe update HTTPToolKit.HTTPToolKit `
            --version $packageVersion `
            --urls "$installerUrl|x64" `
            --submit `
            --token "${{ secrets.WINGET_GITHUB_TOKEN }}"
