name: CI
on:
  push:
      branches-ignore:
        - 'dependabot/**'
      tags:
        - '**'
  pull_request:
jobs:
  build:
    name: Build & test
    strategy:
      matrix:
        include:
          - platform: linux
            arch: x64
            os: "ubuntu-22.04"
          - platform: linux
            arch: arm64
            os: "ubuntu-24.04-arm"
          - platform: windows
            arch: x64
            os: "windows-2022"
          - platform: mac
            arch: x64
            os: "macos-15-intel"
          - platform: mac
            arch: arm64
            os: "macos-14"
    runs-on: ${{ matrix.os }}
    environment: ${{ (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) && 'production' || null }}
    permissions:
      contents: read
      id-token: write # OIDC with Azure for Windows signing
    env:
      IS_RELEASE: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          check-latest: true
          cache: 'npm'

      # Due to https://github.com/electron-userland/electron-builder/issues/3901
      # Electron-Builder fails to produce deb packages on arm64 without this:
      - name: Install system FPM to fix ARM64 Linux builds
        if: matrix.platform == 'linux' && matrix.arch == 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install ruby ruby-dev build-essential
          sudo gem install --no-document fpm

      - run: npm ci

      # The API key in APPLE_API_KEY is a PEM cert that must be read from disk:
      - name: Prepare Apple API key
        if: env.IS_RELEASE == 'true' && startsWith(matrix.os, 'macos-')
        run: echo "$APPLE_API_KEY" > ./apple-api-key.p8
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}

      - name: Azure login for Windows signing
        if: env.IS_RELEASE == 'true' && matrix.platform == 'windows'
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Run signed build
        if: env.IS_RELEASE == 'true'
        run: npm run build
        env:
          ENABLE_SIGNING: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # For Mac notarization:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY: ./apple-api-key.p8
          # For Mac signing:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # For Windows signing via Azure Artifact Signing:
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          # Workaround - see FPM install step above
          USE_SYSTEM_FPM: ${{ matrix.platform == 'linux' && matrix.arch == 'arm64' }}

      - name: Run unsigned build
        if: env.IS_RELEASE != 'true'
        run: npm run build
        env:
          ENABLE_SIGNING: false
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USE_SYSTEM_FPM: ${{ matrix.platform == 'linux' && matrix.arch == 'arm64' }}

      - name: Run smoke tests
        run: |
          # We manually start ADB, so the tests don't (because if they do, they fail
          # to exit, due to the hanging process)
          "$ANDROID_HOME/platform-tools/adb" start-server 2>/dev/null || true

          if [ "$RUNNER_OS" == "Linux" ]; then
            xvfb-run --auto-servernum npm test
          else
            npm test
          fi
        shell: bash

      # [DIAG] Cold-start breakdown: figure out *where* the slow first-launch time goes (Electron
      # app-ready is ~14-20s cold vs ~0.7s warm). We deterministically reconstruct cold state with
      # drop_caches + cache resets and isolate each suspected cost. Runs on both linux arches so we
      # can also compare arm64 vs x64. Diagnostic only: always runs, never fails the build.
      # Read the "[DIAG][T+... uptime=Xs] app ready" line emitted by each launch to compare conditions.
      - name: "[DIAG] cold-start breakdown (fontconfig vs cold-reads vs first-run)"
        if: ${{ always() && matrix.platform == 'linux' }}
        continue-on-error: true
        run: |
          set +e
          ELECTRON_DIR="$PWD/node_modules/electron/dist"
          USERDATA="$HOME/.config/HTTP Toolkit"

          now_ms() { date +%s%3N; }
          timed() { local s; s=$(now_ms); "$@"; local e; e=$(now_ms); echo "  -> $((e - s)) ms wall"; }
          drop_caches() { sync; sudo sh -c 'echo 3 > /proc/sys/vm/drop_caches' 2>/dev/null && echo "[page cache dropped]" || echo "[drop_caches FAILED - no sudo?]"; }
          clear_fonts() { rm -rf "$HOME/.cache/fontconfig" 2>/dev/null; sudo rm -rf /var/cache/fontconfig/* 2>/dev/null; }
          clear_userdata() { rm -rf "$USERDATA" 2>/dev/null; }
          warm_electron() { find "$ELECTRON_DIR" -type f -print0 2>/dev/null | xargs -0 cat > /dev/null 2>&1; }
          # Capture the full electron timeline ([DIAG][T+...]) + test markers ([DIAG][test...]),
          # but drop the noisy renderer/CSP console spam. In cold runs 'app ready' is emitted before
          # Playwright attaches its stdout handler, so grabbing the whole T+ timeline is more reliable.
          launch() { xvfb-run --auto-servernum npx playwright test 2>&1 | grep -E "\[DIAG\]\[T\+|\[DIAG\]\[test" || true; }

          echo "##################### HARDWARE / FILESYSTEM #####################"
          uname -a; echo "nproc: $(nproc)"; free -h
          grep -m1 -iE 'model name|CPU implementer|Features' /proc/cpuinfo
          echo "--- workspace mount ---"; findmnt -T "$PWD" 2>/dev/null || df -h "$PWD"
          echo "--- sizes ---"; du -sh "$ELECTRON_DIR" 2>/dev/null; du -sh "$PWD/node_modules" 2>/dev/null

          echo "##################### RAW DISK READ of electron/dist #####################"
          drop_caches
          echo "cold read of electron/dist:"; timed warm_electron
          echo "warm read of electron/dist:"; timed warm_electron

          echo "##################### FONTCONFIG BUILD COST #####################"
          clear_fonts
          echo "fc-cache -f (cold build):"; timed fc-cache -f
          echo "fc-cache -f (already built):"; timed fc-cache -f

          echo "##################### ELECTRON app-ready BREAKDOWN #####################"
          echo "Compare the 'uptime=Xs' at app-ready across conditions:"
          echo "===== A: FULLY COLD (fonts cleared, userdata cleared, page cache dropped) ====="
          clear_fonts; clear_userdata; drop_caches; launch
          echo "===== B: fontconfig PRE-BUILT, else cold  (A minus B = fontconfig BUILD cost) ====="
          clear_fonts; fc-cache -f >/dev/null 2>&1; clear_userdata; drop_caches; launch
          echo "===== C: electron PRE-READ (page warm), fonts cleared  (A minus C = COLD-READ cost) ====="
          clear_fonts; clear_userdata; warm_electron; launch
          echo "===== E: fonts+page WARM, userdata cleared  (E minus D = Chromium FIRST-RUN cost) ====="
          clear_userdata; warm_electron; launch
          echo "===== D: FULLY WARM (everything cached) ====="
          launch
        shell: bash

      - uses: actions/upload-artifact@v6
        if: matrix.platform == 'linux'
        with:
          name: HttpToolkit-linux-${{ matrix.arch }}-deb
          path: dist/HttpToolkit-*.deb
          if-no-files-found: error

      - uses: actions/upload-artifact@v6
        if: matrix.platform == 'linux'
        with:
          name: HttpToolkit-linux-${{ matrix.arch }}-rpm
          path: dist/HttpToolkit-*.rpm
          if-no-files-found: error

      - uses: actions/upload-artifact@v6
        if: matrix.platform == 'linux'
        with:
          name: HttpToolkit-linux-${{ matrix.arch }}-AppImage
          path: dist/HttpToolkit-*.AppImage
          if-no-files-found: error

      - uses: actions/upload-artifact@v6
        if: matrix.platform == 'linux'
        with:
          name: HttpToolkit-linux-${{ matrix.arch }}-zip
          path: dist/HttpToolkit-*linux*.zip
          if-no-files-found: error

      - uses: actions/upload-artifact@v6
        if: matrix.platform == 'windows'
        with:
          name: HttpToolkit-windows-${{ matrix.arch }}-exe
          path: dist/HttpToolkit-*.exe
          if-no-files-found: error

      - uses: actions/upload-artifact@v6
        if: matrix.platform == 'windows'
        with:
          name: HttpToolkit-windows-${{ matrix.arch }}-zip
          path: dist/HttpToolkit-*win*.zip
          if-no-files-found: error

      - uses: actions/upload-artifact@v6
        if: matrix.platform == 'mac'
        with:
          name: HttpToolkit-mac-${{ matrix.arch }}-dmg
          path: dist/HttpToolkit-*.dmg
          if-no-files-found: error
  publish:
    name: Publish a release
    runs-on: "ubuntu-22.04"
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Get all distributables
        uses: actions/download-artifact@v7

      - name: Normalize arch names to x64 or arm64
        run: |
          find . -maxdepth 2 -type f -name "*" | while read -r file; do
            filename=$(basename "$file")
            newname=$(echo "$filename" | sed -e 's/amd64/x64/g' -e 's/x86_64/x64/g' -e 's/aarch64/arm64/g')
            if [ "$filename" != "$newname" ]; then
              mv -v "$file" "$newname"
            fi
          done

      - name: Publish to GitHub Releases
        uses: svenstaro/upload-release-action@v2
        with:
          tag: ${{ github.ref }}
          prerelease: true
          file: ./**/*
          file_glob: true
          repo_token: ${{ secrets.GITHUB_TOKEN }}

  submit-winget:
    name: Submit to WinGet repository
    needs: publish
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    # wingetcreate only runs on Windows
    runs-on: windows-latest
    steps:
      - name: Sync winget-pkgs fork with upstream
        env:
          GH_TOKEN: ${{ secrets.WINGET_GITHUB_TOKEN }}
        run: |
          $forkOwner = gh api user --jq '.login'
          gh repo sync "$forkOwner/winget-pkgs" --source microsoft/winget-pkgs

      - name: Submit package using wingetcreate
        run: |
          $packageVersion = "${{ github.ref }}" -replace 'refs/tags/v', ''
          $installerUrl = "https://github.com/httptoolkit/httptoolkit-desktop/releases/download/v$packageVersion/HttpToolkit-$packageVersion.exe"

          # Update package using wingetcreate
          Invoke-WebRequest https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe
          .\wingetcreate.exe update HTTPToolKit.HTTPToolKit `
            --version $packageVersion `
            --urls "$installerUrl|x64" `
            --submit `
            --token "${{ secrets.WINGET_GITHUB_TOKEN }}"
